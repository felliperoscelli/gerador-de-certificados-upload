<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Certificados</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

#certificatesContainer img{
margin-top:20px;
border:1px solid #ccc;
}

textarea{
width:100%;
height:120px;
}

button{
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<h2>Gerador de Certificados</h2>

<form id="certificateForm">

<label>Imagem do Certificado</label>
<br>
<input type="file" id="modelImage" accept="image/*" required>

<br><br>

<img id="imagePreview" style="width:100%;max-width:700px">

<br><br>

<label>Fonte</label>
<select id="fontSelector">
<option value="Times New Roman">Times New Roman</option>
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Verdana">Verdana</option>
</select>

<br><br>

<label>Tamanho base da fonte</label>
<input type="number" id="fontSizeSelector" value="80">

<br><br>

<div id="fontPreview">
Exemplo do Nome
</div>

<br>

<label>Lista de nomes (1 por linha)</label>
<textarea id="namesList"></textarea>

<br>

<button type="submit">Gerar certificados</button>

</form>

<br>

<button id="downloadSinglePDF">
Baixar PDF individual
</button>

<button id="downloadAllPDFs">
Baixar TODOS em PDF (ZIP)
</button>

<h3>Certificados gerados</h3>

<div id="certificatesContainer"></div>

<script src="script.js"></script>

</body>
</html>
