<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Gerador de Certificados</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Sacramento&display=swap" rel="stylesheet">

<!-- BIBLIOTECAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-top:0;
}

label{
font-weight:bold;
}

textarea{
width:100%;
height:120px;
padding:10px;
}

select,input{
padding:6px;
margin-top:4px;
}

button{
background:#2c7be5;
border:none;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

button:hover{
background:#1a5dc9;
}

#imagePreview{
width:100%;
max-width:700px;
display:block;
margin:auto;
margin-top:20px;
}

#fontPreview{
margin-top:10px;
font-size:40px;
text-align:center;
}

#certificatesContainer img{
margin-top:20px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="container">

<h1>Gerador de Certificados</h1>

<form id="certificateForm">

<label>Imagem do Certificado</label><br>
<input type="file" id="modelImage" accept="image/*">

<br><br>

<img id="imagePreview">

<br><br>

<label>Fonte</label><br>

<select id="fontSelector">

<option value="Great Vibes">Great Vibes</option>
<option value="Parisienne">Parisienne</option>
<option value="Sacramento">Sacramento</option>

</select>

<br><br>

<label>Tamanho base da fonte</label><br>
<input type="number" id="fontSizeSelector" value="80">

<br><br>

<div id="fontPreview">
Exemplo de Nome
</div>

<br>

<label>Lista de nomes (um por linha)</label>

<textarea id="namesList"></textarea>

<br>

<button type="submit">
Gerar certificados
</button>

</form>

<br>

<button id="downloadAllPDFs">
Baixar TODOS em PDF (ZIP)
</button>

<h3>Prévia dos certificados</h3>

<div id="certificatesContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
